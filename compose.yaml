services:
  # PostgreSQL database — shared by all profiles.
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: kontinuum
      POSTGRES_PASSWORD: kontinuum
      POSTGRES_DB: kontinuum
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kontinuum -d kontinuum"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Development mode with air hot reloading.
  kontinuum-dev:
    profiles: ["dev"]
    image: cosmtrek/air:latest
    working_dir: /app
    volumes:
      - .:/app
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      KONTINUUM_SERVER_ADDR: ":8080"
      KONTINUUM_SERVER_STORAGE: "postgres://kontinuum:kontinuum@postgres:5432/kontinuum?sslmode=disable"
      KONTINUUM_LOG_LEVEL: "info"
      KONTINUUM_LOG_FORMAT: "console"
      GOTOOLCHAIN: auto
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  go_mod_cache:
  go_build_cache:
